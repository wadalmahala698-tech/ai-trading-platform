<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Trading Wallet</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:30px;
}

input,button{
width:90%;
padding:15px;
margin:10px;
font-size:18px;
}

button{
background:#222;
color:white;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Wallet</h1>

<input id="user" placeholder="Username">

<button onclick="balance()">Show Balance</button>

<button onclick="deposit()">Deposit 100</button>

<button onclick="withdraw()">Withdraw 100</button>


<h2 id="result"></h2>


<script>

const server="http://localhost:8000";


function balance(){

fetch(server+"/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:document.getElementById("user").value,

password:"1234"

})

})

.then(r=>r.json())

.then(data=>{

document.getElementById("result").innerHTML =
"Balance: "+data.balance;

});

}


function deposit(){

sendMoney("deposit");

}


function withdraw(){

sendMoney("withdraw");

}


function sendMoney(action){

fetch(server+"/"+action,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:document.getElementById("user").value,

amount:100

})

})

.then(r=>r.json())

.then(data=>{

document.getElementById("result").innerHTML =
JSON.stringify(data);

});

}

</script>

</body>

</html>
