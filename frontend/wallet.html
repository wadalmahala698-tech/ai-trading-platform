<!DOCTYPE html>
<html>

<head>
<title>AI Trading Wallet</title>
</head>

<body>

<h1>Wallet</h1>

<input id="user" placeholder="Username">

<br><br>

<button onclick="balance()">Check Balance</button>

<button onclick="deposit()">Deposit 100</button>

<button onclick="withdraw()">Withdraw 100</button>

<h2 id="result"></h2>


<script>

function send(path, amount){

fetch("http://localhost:8000/" + path, {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("user").value,

amount:amount

})

})

.then(r=>r.json())

.then(data=>{

document.getElementById("result").innerHTML =
JSON.stringify(data);

});

}


function deposit(){

send("deposit",100);

}


function withdraw(){

send("withdraw",100);

}


function balance(){

fetch("http://localhost:8000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("user").value,

password:"1234"

})

})

.then(r=>r.json())

.then(data=>{

document.getElementById("result").innerHTML =
JSON.stringify(data);

});

}

</script>

</body>
</html>
